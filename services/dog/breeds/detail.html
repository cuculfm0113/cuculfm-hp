function loadDetailImage(breedId) {
    const apiPath = DOG_API[breedId];
    if (!apiPath) return;
    fetch(`https://dog.ceo/api/breed/${apiPath}/images/random`)
        .then(r => r.json())
        .then(data => {
            if (data.status === 'success') {
                const container = document.querySelector('.detail-hero-image');
                if (container) {
                    const img = document.createElement('img');
                    img.src = data.message;
                    img.alt = D[breedId]?.name || '';
                    img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;border-radius:16px;';
                    container.style.position = 'relative';
                    container.appendChild(img);
                }
            }
        })
        .catch(() => {});
}

    const gc = g.c;

                <span>${b.name}</span>
            </div>
            <div class="detail-hero-inner">

                    <p class="hero-label">GROUP ${b.group} — ${g.nameEn}</p>

                    <p class="detail-name-en">${b.nameEn.toUpperCase()}</p>
                    <div class="quick-stats">
                        <div class="quick-stat"><div class="quick-stat-label">サイズ</div><div class="quick-stat-value quick-stat-value--primary">${SZ[b.size]}</div></div>
                        <div class="quick-stat"><div class="quick-stat-label">原産国</div><div class="quick-stat-value">${b.origin}</div></div>
                        <div class="quick-stat"><div class="quick-stat-label">寿命</div><div class="quick-stat-value">${b.lifespan}</div></div>

                        <div class="quick-stat"><div class="quick-stat-label">体高</div><div class="quick-stat-value">${b.height}</div></div>
                    </div>
                </div>
                <div class="detail-hero-image">
                    <div class="breed-placeholder" style="--ph-r:${gc.split(',')[0]};--ph-g:${gc.split(',')[1]};--ph-b:${gc.split(',')[2]}">
                        ${pawSVG}
                        <span class="breed-placeholder-label">PHOTO COMING SOON</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div class="container">
        <!-- 性格・特徴 -->
        <section class="detail-section">
            <p class="detail-section-label">PERSONALITY</p>
            <h2 class="detail-section-title">性格・特徴</h2>
            <div class="detail-traits">${b.traits.map(t=>`<span class="detail-trait">${t}</span>`).join('')}</div>
            <p class="detail-description">${b.personality}</p>
            <div class="rating-bars">
                ${ratingBar('運動量',b.exercise)}
                ${ratingBar('お手入れ',b.grooming)}
                ${ratingBar('しつけやすさ',b.trainability)}
            </div>
        </section>

        <!-- 育て方 -->
        <section class="detail-section">
            <p class="detail-section-label">HOW TO RAISE</p>
            <h2 class="detail-section-title">育て方のポイント</h2>
            <div class="info-cards">
                <div class="info-card info-card--full">
                    <svg class="info-card-icon" viewBox="0 0 24 24" fill="none"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <h3 class="info-card-title">飼育のポイント</h3>
                    <ul class="info-card-list">${listItems(b.care)}</ul>
                </div>
            </div>
        </section>

        <!-- 注意点 -->
        <section class="detail-section">
            <p class="detail-section-label">CAUTION</p>
            <h2 class="detail-section-title">注意点</h2>
            <div class="info-cards">
                <div class="info-card info-card--full">
                    <svg class="info-card-icon" viewBox="0 0 24 24" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2"/><path d="M12 9v4M12 17h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    <h3 class="info-card-title">飼う前に知っておきたいこと</h3>
                    <ul class="info-card-list">${listItems(b.caution)}</ul>
                </div>
            </div>
        </section>

        <!-- 健康管理 -->
        <section class="detail-section">
            <p class="detail-section-label">HEALTH CARE</p>
            <h2 class="detail-section-title">健康管理・かかりやすい病気</h2>
            <div class="info-cards">
                <div class="info-card">
                    <svg class="info-card-icon" viewBox="0 0 24 24" fill="none"><path d="M22 12h-4l-3 9L9 3l-3 9H2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <h3 class="info-card-title">かかりやすい病気</h3>
                    <ul class="info-card-list">${listItems(b.health)}</ul>
                </div>
                <div class="info-card">
                    <svg class="info-card-icon" viewBox="0 0 24 24" fill="none"><path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    <h3 class="info-card-title">食事のポイント</h3>
                    <p class="info-card-text">${b.diet}</p>
                </div>
            </div>
        </section>

        <!-- おすすめ -->
        <section class="detail-section">
            <p class="detail-section-label">RECOMMENDED</p>
            <h2 class="detail-section-title">こんな方におすすめ</h2>

        </section>

        <!-- Navigation -->
        <nav class="detail-nav">
            ${prev?`<a href="detail.html?id=${BREED_IDS[idx-1]}" class="detail-nav-link"><span class="detail-nav-label">← PREV</span><span class="detail-nav-name">${prev.name}</span></a>`:'<div></div>'}
            ${next?`<a href="detail.html?id=${BREED_IDS[idx+1]}" class="detail-nav-link detail-nav-link--next"><span class="detail-nav-label">NEXT →</span><span class="detail-nav-name">${next.name}</span></a>`:'<div></div>'}

        <div class="back-to-list">

    </div>`;
}

render();

const currentId = getBreedId();
